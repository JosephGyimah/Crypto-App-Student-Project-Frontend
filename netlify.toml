[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { VITE_BACKEND_URL = "https://crypto-app-student-project-backend-1.onrender.com" }

[context.deploy-preview]
  environment = { VITE_BACKEND_URL = "http://localhost:5000" }

[context.branch-deploy]
  environment = { VITE_BACKEND_URL = "http://localhost:5000" }
